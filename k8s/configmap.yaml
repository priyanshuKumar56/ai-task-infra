apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: ai-task-platform
data:
  NODE_ENV: "production"
  PORT: "5000"
  JWT_EXPIRES_IN: "15m"
  JWT_REFRESH_EXPIRES_IN: "7d"
  LOG_LEVEL: "info"
  ALLOWED_ORIGINS: "https://ai-task-manager-sepia.vercel.app,http://localhost:3000"
  MONGO_DB_NAME: "ai-task-platform"
  METRICS_PORT: "9090"
  HEALTH_PORT: "8080"
  APP_VERSION: "1.0.0"
